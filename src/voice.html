<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TradingView Voice</title>
  <style>
    :root {
      --bg: #131722;
      --surface: #1e222d;
      --accent: #2962ff;
      --text: #d1d4dc;
      --dim: #787b86;
      --red: #f23645;
      --green: #26a69a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 14px 18px;
      border-bottom: 1px solid #2a2e39;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .dot.off { background: var(--red); }
    header h1 { font-size: 15px; font-weight: 600; }
    #status { font-size: 12px; color: var(--dim); margin-left: auto; }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .hint { text-align: center; color: var(--dim); font-size: 13px; padding: 24px 16px; line-height: 1.6; }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      animation: pop .15s ease;
      word-break: break-word;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.ai   { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.error { background: #3a1a1e; color: #f9a8a8; align-self: flex-start; border-bottom-left-radius: 4px; }

    .thinking { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px;
                padding: 12px 16px; border-radius: 18px; }
    .thinking span { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
                     background: var(--dim); margin: 0 2px; animation: bounce .9s infinite; }
    .thinking span:nth-child(2) { animation-delay: .15s; }
    .thinking span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    /* ── Footer ── */
    footer {
      padding: 12px 16px 28px;
      border-top: 1px solid #2a2e39;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #mic {
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 24px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform .1s, background .2s; flex-shrink: 0;
    }
    #mic:active { transform: scale(.92); }
    #mic.on  { background: var(--red); animation: ring 1s infinite; }
    #mic.busy { background: #444; cursor: default; }
    @keyframes ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(242,54,69,.45); }
      50%      { box-shadow: 0 0 0 14px rgba(242,54,69,0); }
    }
    #input {
      flex: 1; background: var(--surface); border: 1px solid #2a2e39;
      border-radius: 24px; padding: 11px 16px; color: var(--text);
      font-size: 15px; outline: none;
    }
    #input::placeholder { color: var(--dim); }
    #send {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <div class="dot off" id="dot"></div>
  <h1>📈 TradingView Voice</h1>
  <span id="status">Connecting…</span>
</header>

<div id="chat">
  <div class="hint">
    Tap 🎤 and ask anything about your chart.<br>
    <small style="color:#555">"What's Bitcoin price?" · "Show me AAPL" · "What's the RSI?"</small>
  </div>
</div>

<footer>
  <button id="mic">🎤</button>
  <input id="input" type="text" placeholder="Ask about your chart…" />
  <button id="send">➤</button>
</footer>

<script>
  // ── API key ─────────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  let API_KEY = params.get('key') || localStorage.getItem('tv_api_key') || '';
  if (!API_KEY) {
    API_KEY = prompt('Enter your MCP API key:') || '';
    if (API_KEY) localStorage.setItem('tv_api_key', API_KEY);
  }

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const chatEl   = document.getElementById('chat');
  const micBtn   = document.getElementById('mic');
  const inputEl  = document.getElementById('input');
  const sendBtn  = document.getElementById('send');
  const statusEl = document.getElementById('status');
  const dotEl    = document.getElementById('dot');

  // ── State ─────────────────────────────────────────────────────────────────
  let busy = false;
  let listening = false;
  let recognition = null;

  // ── Health check ─────────────────────────────────────────────────────────
  (async () => {
    try {
      const r = await fetch('/health');
      if (r.ok) { dotEl.className = 'dot'; setStatus('Ready'); }
    } catch { setStatus('Server offline'); }
  })();

  function setStatus(t) { statusEl.textContent = t; }

  // ── Speech recognition ────────────────────────────────────────────────────
  function buildRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = 'en-US';
    r.continuous = false;
    r.interimResults = false;
    r.onresult = e => { stopListen(); send(e.results[0][0].transcript); };
    r.onerror  = e => { stopListen(); if (e.error !== 'aborted') addMsg('error', 'Mic error: ' + e.error); };
    r.onend    = () => stopListen();
    return r;
  }

  micBtn.onclick = () => {
    if (busy) return;
    listening ? stopListen() : startListen();
  };

  function startListen() {
    if (!recognition) recognition = buildRecognition();
    if (!recognition) { addMsg('error', 'Voice not supported — use Chrome on Android.'); return; }
    try {
      recognition.start();
      listening = true;
      micBtn.className = 'on';
      micBtn.textContent = '⏹';
      setStatus('Listening…');
    } catch(e) { console.error(e); }
  }

  function stopListen() {
    listening = false;
    micBtn.className = busy ? 'busy' : '';
    micBtn.textContent = busy ? '⏳' : '🎤';
    if (!busy) setStatus('Ready');
    try { recognition?.stop(); } catch {}
  }

  // ── Text input ────────────────────────────────────────────────────────────
  sendBtn.onclick = () => { const t = inputEl.value.trim(); if (t) { inputEl.value = ''; send(t); } };
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });

  // ── Chat helpers ──────────────────────────────────────────────────────────
  function addMsg(role, text) {
    document.querySelector('.hint')?.remove();
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = text;
    chatEl.appendChild(d);
    chatEl.scrollTop = chatEl.scrollHeight;
    return d;
  }

  function addThinking() {
    document.querySelector('.hint')?.remove();
    const d = document.createElement('div');
    d.className = 'thinking';
    d.innerHTML = '<span></span><span></span><span></span>';
    chatEl.appendChild(d);
    chatEl.scrollTop = chatEl.scrollHeight;
    return d;
  }

  function speak(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.05;
    speechSynthesis.speak(u);
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function send(text) {
    if (busy) return;
    busy = true;
    stopListen();
    micBtn.className = 'busy';
    micBtn.textContent = '⏳';
    setStatus('Thinking…');

    addMsg('user', text);
    const thinking = addThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      thinking.remove();

      if (data.error) {
        addMsg('error', data.error);
      } else {
        addMsg('ai', data.response);
        speak(data.response);
      }
    } catch {
      thinking.remove();
      addMsg('error', 'Cannot reach server. Is it running?');
    }

    busy = false;
    micBtn.className = '';
    micBtn.textContent = '🎤';
    setStatus('Ready');
  }
</script>
</body>
</html>
